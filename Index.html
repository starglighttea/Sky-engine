<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKY BEAN</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to bottom right, #a0d8f1, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 {
      font-size: 64px;
      margin-bottom: 20px;
      color: #3a3a3a;
    }
    #searchForm {
      display: flex;
      width: 80%;
      max-width: 500px;
    }
    #query {
      flex: 1;
      padding: 12px 16px;
      font-size: 18px;
      border-radius: 25px 0 0 25px;
      border: 2px solid #ccc;
      outline: none;
    }
    #searchButton {
      padding: 12px 20px;
      font-size: 18px;
      border: 2px solid #ccc;
      border-left: 0;
      background-color: #3a3a3a;
      color: white;
      cursor: pointer;
      border-radius: 0 25px 25px 0;
    }
    #searchButton:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <h1>☁️ SKY BEAN</h1>
  <form id="searchForm">
    <input type="text" id="query" placeholder="Search the web..." required>
    <button type="submit" id="searchButton">Go</button>
  </form>

  <script>
    const form = document.getElementById("searchForm");
    form.onsubmit = function(e) {
      e.preventDefault();
      const query = document.getElementById("query").value.trim();
      if (!query) return;

      // Go to DuckDuckGo HTML search for cleaner result links
      const url = "https://duckduckgo.com/html/?q=" + encodeURIComponent(query);
      window.location.href = url;
    }
  </script>
</body>
</html>
