<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☁️ SKY BEAN</title>
<style>
  :root {
    --bg-light: #a0d8f1;
    --bg-dark: #1e1e1e;
    --text-light: #3a3a3a;
    --text-dark: #ffffff;
    --input-light: #ffffff;
    --input-dark: #333333;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    background: var(--bg-light);
    color: var(--text-light);
  }

  body.dark {
    background: var(--bg-dark);
    color: var(--text-dark);
  }

  h1 {
    font-size: 64px;
    margin-bottom: 10px;
  }

  #logo {
    width: 120px;
    margin-bottom: 20px;
  }

  #searchForm {
    display: flex;
    width: 80%;
    max-width: 500px;
  }

  #query {
    flex: 1;
    padding: 12px 16px;
    font-size: 18px;
    border-radius: 25px 0 0 25px;
    border: 2px solid #ccc;
    outline: none;
    background-color: var(--input-light);
    color: var(--text-light);
  }

  body.dark #query {
    background-color: var(--input-dark);
    color: var(--text-dark);
    border-color: #555;
  }

  #searchButton {
    padding: 12px 20px;
    font-size: 18px;
    border: 2px solid #ccc;
    border-left: 0;
    background-color: #3a3a3a;
    color: white;
    cursor: pointer;
    border-radius: 0 25px 25px 0;
  }

  #searchButton:hover {
    background-color: #555;
  }

  #toggleDark {
    margin-top: 20px;
    cursor: pointer;
    font-size: 16px;
    padding: 6px 12px;
    border: none;
    border-radius: 10px;
    background-color: #888;
    color: white;
  }

  #lastSearches {
    margin-top: 20px;
    text-align: left;
    max-width: 500px;
    width: 80%;
  }

  #lastSearches h3 {
    margin-bottom: 5px;
  }

  #lastSearches ul {
    padding-left: 20px;
  }

  #lastSearches li {
    margin-bottom: 3px;
  }

  #lastSearches a {
    color: inherit;
    text-decoration: underline;
  }
</style>
</head>
<body>
<img id="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Cloud_icon.svg/1024px-Cloud_icon.svg.png" alt="Sky Bean Logo">
<h1>☁️ SKY BEAN</h1>

<form id="searchForm">
  <input type="text" id="query" placeholder="Search the web..." required>
  <button type="submit" id="searchButton">Go</button>
</form>

<button id="toggleDark">Toggle Dark Mode</button>

<div id="lastSearches">
  <h3>Last Searches:</h3>
  <ul id="searchList"></ul>
</div>

<script>
  const form = document.getElementById("searchForm");
  const queryInput = document.getElementById("query");
  const searchList = document.getElementById("searchList");
  const toggleDark = document.getElementById("toggleDark");

  // Load last searches from localStorage
  let searches = JSON.parse(localStorage.getItem("skybean_searches")) || [];
  function renderSearches() {
    searchList.innerHTML = "";
    searches.slice(-5).reverse().forEach(q => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "https://duckduckgo.com/html/?q=" + encodeURIComponent(q);
      a.target = "_blank";
      a.textContent = q;
      li.appendChild(a);
      searchList.appendChild(li);
    });
  }
  renderSearches();

  // Search submission
  form.onsubmit = function(e) {
    e.preventDefault();
    const q = queryInput.value.trim();
    if (!q) return;

    searches.push(q);
    localStorage.setItem("skybean_searches", JSON.stringify(searches));
    renderSearches();

    window.location.href = "https://duckduckgo.com/html/?q=" + encodeURIComponent(q);
  }

  // Dark mode toggle
  toggleDark.onclick = function() {
    document.body.classList.toggle("dark");
  }
</script>
</body>
</html>
